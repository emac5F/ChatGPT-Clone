<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header class="main-header">
        <h1>ChatGPT <span class="badge">Clone</span></h1>
        <button class="toggle-theme" aria-label="Cambiar tema">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" class="icon sun">
                <path d="M6.995 12c0 2.761 2.246 5.007 5.007 5.007s5.007-2.246 5.007-5.007-2.246-5.007-5.007-5.007S6.995 9.239 6.995 12zM11 19h2v3h-2zm0-17h2v3h-2zm-9 9h3v2H2zm17 0h3v2H2zm-13.363 8.778l-1.414-1.414 2.121-2.121 1.414 1.414zM16.242 6.344l2.122-2.122 1.414 1.414-2.122 2.122zM6.344 7.759 4.223 5.637l1.415-1.414 2.12 2.122zm13.434 10.605-1.414 1.414-2.122-2.122 1.414-1.414z"></path>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" class="icon moon">
                <path d="M12 11.807A9.002 9.002 0 0 1 10.049 2a9.942 9.942 0 0 0-5.12 2.735c-3.905 3.905-3.905 10.237 0 14.142 3.906 3.906 10.237 3.905 14.143 0a9.946 9.946 0 0 0 2.735-5.119A9.003 9.003 0 0 1 12 11.807z"></path>
            </svg>
        </button>
    </header>

    <main class="chat-container">
        <section class="messages-area" id="messages-area">
            <ul id="chat-list">
                </ul>
        </section>

        <form class="input-area" id="chat-form">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje aquí..." autocomplete="off">
            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer class="main-footer">
        <p>ChatGPT &copy; 2026 | Desarrollado por <strong>Edith Avendaño</strong></p>
    </footer>

    <template id="message-template">
        <li class="message">
            <div class="bubble">
                <p></p>
            </div>
        </li>
    </template>

    <script src="./app.js"></script>
</body>
</html>
